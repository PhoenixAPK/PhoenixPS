<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Phoenix Printing Solutions | Admin Invoice</title>
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Plus+Jakarta+Sans:wght@300;500;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="../assets/js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root { --glass: rgba(0,0,0,0.6); --glass-border: rgba(255,255,255,0.2); --electric-lime:#00FF87; --fire-orange:#ff4d00; --fire-yellow:#ffcc00; --pps-green:#046C4E; }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#020605 url('../assets/images/PPS Background.png') no-repeat center center fixed;background-size:cover;color:#fff;overflow-x:hidden;display:block !important}
    body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:-1}
    nav{padding:20px 5%;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(20px);position:fixed;width:100%;top:0;z-index:1000;border-bottom:1px solid var(--glass-border)}
    .brand-name{font-family:'Syncopate',sans-serif;font-weight:700;font-size:1.4rem;letter-spacing:2px;text-transform:uppercase;color:#fff;text-shadow:0 0 5px #fff,0 0 10px #ffcc00,0 0 20px #ff4d00,0 0 30px #ff4d00,0 0 40px #ff0000;animation:flicker 1.5s infinite alternate}
    @keyframes flicker{0%{opacity:1;text-shadow:0 0 10px var(--fire-orange),0 0 20px var(--fire-yellow)}100%{opacity:.9;text-shadow:0 0 15px var(--fire-orange),0 0 30px var(--fire-orange),0 0 40px #ff0000}}
    .nav-buttons{display:flex;gap:20px}
    .nav-btn{text-decoration:none;color:#fff;font-family:'Syncopate',sans-serif;font-size:.7rem;font-weight:700;padding:10px 18px;border-radius:5px;transition:.3s;border:1px solid transparent}
    .nav-btn:hover{color:var(--electric-lime);border-color:var(--electric-lime);background:rgba(0,255,135,0.1)}
    .container{max-width:960px;margin:120px auto 40px;padding:25px;background:#cccccc;border-radius:12px;color:#333;font-family:'Roboto',sans-serif;position:relative}
    .centered-header{display:flex;flex-direction:column;align-items:center;margin-bottom:20px}
    .centered-header img{max-height:60px;margin-bottom:10px}
    .client-info,.costs{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:20px;padding:12px;background:rgba(255,255,255,0.7);border-radius:8px;align-items:end;backdrop-filter:blur(3px)}
    .client-info label{display:block;margin-bottom:4px;font-weight:500;color:#333;font-size:13px}
    .client-info input,.client-info select,.costs input{width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;background:#fff}
    .pictures{margin-bottom:20px;background:rgba(255,255,255,0.7);padding:15px;border-radius:8px}
    .pictures h2{font-size:18px;margin-bottom:10px;color:#046C4E}
    .workspace-container{display:flex;gap:20px;margin-bottom:20px}
    .workspace-column{flex:1;display:flex;flex-direction:column;gap:10px}
    .grid-header{display:grid;grid-template-columns:58px 58px 58px 58px;gap:6px;font-weight:700;font-size:12px;text-align:center}
    .picture-row{display:grid;grid-template-columns:58px 58px 58px 58px 40px;gap:6px;align-items:center;margin-bottom:5px}
    .workspace-cell{width:100% !important; text-align:center; font-size:13px}
    span.workspace-cell{font-weight:bold; color:#046C4E; background:rgba(224,242,241,0.8); border-radius:4px; padding:6px 0}
    .btn{padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:600; border:none; background:var(--pps-green); color:#fff}
    #modeLabel{position:absolute; top:20px; right:20px; background:var(--pps-green); color:#fff; padding:8px 12px; border-radius:8px}
    /* Invoice Styling */
    .invoice-container{background:#fff; padding:30px; border-radius:12px; color:#333}
    .invoice-header{text-align:center; margin-bottom:20px}
    .invoice-table{width:100%; border-collapse:collapse; margin-top:20px}
    .invoice-table th, .invoice-table td{border:1px solid #eee; padding:10px; text-align:center}
    .invoice-table th{background:var(--pps-green); color:#fff}
  </style>
</head>
<body>
  <nav>
    <span class="brand-name">Phoenix Printing Solutions</span>
    <div class="nav-buttons">
      <a href="pendingqueue.html" class="nav-btn">PENDING QUEUE</a>
      <a href="admininvoice.html" class="nav-btn">INVOICE</a>
      <a href="#" class="nav-btn" onclick="logoutAdmin()">LOGOUT</a>
    </div>
  </nav>

  <div id="modePage" class="mode-selection-vertical" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
    <h1 class="brand-name" style="font-size: 3rem; margin-bottom: 40px;">Phoenix Printing Solutions</h1>
    <div style="display: flex; gap: 30px;">
      <button class="btn" style="padding: 20px 40px;" onclick="startClientMode()">Client Mode</button>
      <button class="btn" style="padding: 20px 40px;" onclick="startEntrepreneurMode()">Entrepreneur Mode</button>
    </div>
  </div>

  <div id="calculatorPage" class="container" style="display:none;">
    <button class="btn" onclick="returnToMode()">⬅️ Return</button>
    <div id="modeLabel"></div>
    <div class="centered-header">
      <img src="../assets/images/PPS logo.png" alt="Logo" />
      <h1>Phoenix Printing Solutions</h1>
    </div>

    <div class="client-info">
      <div><label id="labelName">Name:</label><input type="text" id="clientName" /></div>
      <div><label id="labelContact">Phone:</label><input type="text" id="clientContact" /></div>
      <div><label id="labelEmail">Email:</label><input type="email" id="clientEmail" /></div>
      <div><label id="labelAddress">Address:</label><input type="text" id="clientAddress" /></div>
      <div><label>City:</label><select id="clientCity" onchange="handleCity()"></select></div>
      <div><label>Region:</label><input type="text" id="clientRegion" readonly /></div>
      <div><label>Distance (km):</label><input type="text" id="distanceInput" readonly /></div>
      <div><label>Pictures:</label><input type="text" id="mandatoryPicturesOutput" readonly /></div>
      <div><label>Duration:</label><input type="text" id="projectDurationOutput" readonly /></div>
    </div>

    <div class="pictures">
      <h2>Workspaces</h2>
      <div class="workspace-container">
        <div class="workspace-column">
          <div class="grid-header"><span>H</span><span>W</span><span>Act</span><span>Chg</span></div>
          <div id="leftPictureContainer"></div>
        </div>
        <div class="workspace-column">
          <div class="grid-header"><span>H</span><span>W</span><span>Act</span><span>Chg</span></div>
          <div id="rightPictureContainer"></div>
        </div>
      </div>
      <button class="btn" onclick="addPictureRow(false)">➕ Add Optional Workspace</button>
    </div>

    <div class="costs">
      <div><label>Fuel Cost (DH):</label><input type="number" id="fuelPrice" step="0.01" /></div>
      <div><label>Toll (DH):</label><input type="number" id="tollPrice" step="0.01" /></div>
      <div><label>Accommodation:</label><input type="number" id="accommodationPrice" step="0.01" /></div>
    </div>

    <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
      <button class="btn" onclick="generateInvoice()">🧾 Generate Invoice</button>
      <button class="btn" onclick="downloadInvoice()">⬇️ Download PDF</button>
    </div>

    <div id="invoiceDisplay"></div>
  </div>

  <script>
    const LOGO_PATH = '../assets/images/PPS logo.png';
    let isEntrepreneur = false;
    let pictureCount = 0;

    const cityData = [
      { city: "Rabat", region: "Rabat-Salé-Kénitra", distance_km: 0 },
      { city: "Salé", region: "Rabat-Salé-Kénitra", distance_km: 0 },
      { city: "Casablanca", region: "Casablanca-Settat", distance_km: 90 },
      { city: "Tangier (Tanger)", region: "Tanger-Tétouan-Al Hoceïma", distance_km: 280 },
      { city: "Marrakesh (Marrakech)", region: "Marrakech-Safi", distance_km: 330 },
      { city: "Agadir", region: "Souss-Massa", distance_km: 500 },
      { city: "Fes (Fès)", region: "Fès-Meknès", distance_km: 200 }
      // Add more cities as needed
    ];

    function getCityData(city) { return cityData.find(item => item.city === city); }
    function getDistance(city) { const data = getCityData(city); return data ? data.distance_km : 0; }

    function getMandatory(distance) {
      if (isEntrepreneur) {
        if (distance <= 50) return 6;
        if (distance <= 199) return 14;
        return 20;
      } else {
        if (distance <= 50) return 4;
        if (distance <= 199) return 10;
        return 15;
      }
    }

    function handleCity() {
      const city = document.getElementById("clientCity").value;
      document.getElementById("leftPictureContainer").innerHTML = "";
      document.getElementById("rightPictureContainer").innerHTML = "";
      pictureCount = 0;

      if (!city) return;

      const info = getCityData(city);
      const d = getDistance(city);
      document.getElementById("distanceInput").value = d + " km";
      document.getElementById("clientRegion").value = info ? info.region : "";

      const need = getMandatory(d);
      const left = Math.ceil(need / 2);

      for (let i = 0; i < left; i++) addPictureRow(true, document.getElementById("leftPictureContainer"));
      for (let i = 0; i < (need - left); i++) addPictureRow(true, document.getElementById("rightPictureContainer"));
      
      updateTotalPictureCount();
    }

    function addPictureRow(isMandatory, target = null) {
      pictureCount++;
      const div = document.createElement("div");
      div.className = "picture-row";
      div.id = `row${pictureCount}`;
      const delBtn = isMandatory ? '<span></span>' : `<button onclick="document.getElementById('row${pictureCount}').remove(); updateTotalPictureCount();">❌</button>`;
      div.innerHTML = `<input type="number" step="0.01" class="height workspace-cell" oninput="calculateAreas()"><input type="number" step="0.01" class="width workspace-cell" oninput="calculateAreas()"><span class="actualArea workspace-cell">0.00</span><span class="chargeableArea workspace-cell">0.00</span>${delBtn}`;
      
      if (target) target.appendChild(div);
      else {
        const L = document.getElementById("leftPictureContainer").children.length;
        const R = document.getElementById("rightPictureContainer").children.length;
        (L <= R ? document.getElementById("leftPictureContainer") : document.getElementById("rightPictureContainer")).appendChild(div);
      }
    }

    function calculateAreas() {
      let total = 0;
      document.querySelectorAll(".picture-row").forEach(row => {
        const h = parseFloat(row.querySelector(".height").value) || 0;
        const w = parseFloat(row.querySelector(".width").value) || 0;
        const actual = h * w;
        row.querySelector(".actualArea").innerText = actual.toFixed(2);
        let charge = actual <= 1 ? 1 : Math.ceil(actual * 2) / 2;
        row.querySelector(".chargeableArea").innerText = charge.toFixed(2);
        total += charge;
      });
      const hrs = total / 1;
      document.getElementById("projectDurationOutput").value = hrs.toFixed(1) + " Hours";
      return total;
    }

    function updateTotalPictureCount() {
      document.getElementById("mandatoryPicturesOutput").value = document.querySelectorAll(".picture-row").length;
    }

    function populateCities() {
      const sel = document.getElementById("clientCity");
      sel.innerHTML = '<option value="">Select City</option>';
      cityData.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.city; opt.text = c.city;
        sel.add(opt);
      });
    }

    function startClientMode() { isEntrepreneur = false; init(); }
    function startEntrepreneurMode() { isEntrepreneur = true; init(); }
    
    function init() {
      document.getElementById("modePage").style.display = "none";
      document.getElementById("calculatorPage").style.display = "block";
      document.getElementById("modeLabel").innerText = isEntrepreneur ? "Entrepreneur Mode" : "Client Mode";
      populateCities();
    }

    function returnToMode() {
      document.getElementById("calculatorPage").style.display = "none";
      document.getElementById("modePage").style.display = "flex";
    }

    function generateInvoice() {
        const total = calculateAreas();
        const city = document.getElementById("clientCity").value;
        const name = document.getElementById("clientName").value;
        document.getElementById('invoiceDisplay').innerHTML = `
            <div class="invoice-container">
                <div class="invoice-header">
                    <h1>PHOENIX PRINTING SOLUTIONS</h1>
                    <p>Client: ${name} | City: ${city}</p>
                </div>
                <table class="invoice-table">
                    <tr><th>Item</th><th>Area (m²)</th><th>Price</th></tr>
                    <tr><td>Total Chargeable</td><td>${total.toFixed(2)}</td><td>${(total * 250).toFixed(2)} DH</td></tr>
                </table>
            </div>`;
    }

    async function downloadInvoice() {
        const el = document.querySelector('.invoice-container');
        const canvas = await html2canvas(el);
        const imgData = canvas.toDataURL('image/png');
        const pdf = new jspdf.jsPDF();
        pdf.addImage(imgData, 'PNG', 10, 10, 190, 0);
        pdf.save("Invoice.pdf");
    }
  </script>
</body>
</html>
