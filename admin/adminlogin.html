<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenix Printing Solutions | Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(0, 0, 0, 0.6);
            --glass-border: rgba(255, 255, 255, 0.2);
            --electric-lime: #00FF87;
            --fire-orange: #ff4d00;
            --fire-yellow: #ffcc00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020605 url('../assets/images/PPS Background.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        .login-card {
            width: 400px;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .brand-name {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 5px #fff, 0 0 10px #ffcc00, 0 0 20px #ff4d00;
            margin-bottom: 30px;
            display: block;
        }

        .login-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.2rem;
            color: var(--electric-lime);
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1rem;
            transition: 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--electric-lime);
            background: rgba(0, 255, 135, 0.05);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #FFD700, #FFA500, #FF7A29);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 122, 41, 0.4);
        }

        .message {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #ff4d4d;
            min-height: 20px;
        }

        .back-to-public {
            margin-top: 25px;
            display: block;
            color: #aaa;
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .back-to-public:hover {
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <span class="brand-name">Phoenix Printing Solutions</span>
        <h2 class="login-title">Admin Access</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="login-btn">Secure Login</button>
            <div id="message" class="message"></div>
        </form>
        <a href="../../public/index.html" class="back-to-public">Return to Public Site</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/supabase.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const result = await window.loginAdmin(user, pass);
            const msgEl = document.getElementById('message');

            if (result.success) {
                alert('Welcome Boss!');
                window.location.href = 'pendingqueue.html';
            } else {
                msgEl.textContent = result.message;
                if (result.redirect) {
                    setTimeout(() => {
                        window.location.href = '../public/index.html';
                    }, 500); // Near immediate redirect
                }
            }
        });
    </script>
</body>
</html>
