<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phoenix Printing Solutions | Redefine Your Space</title>

  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Plus+Jakarta+Sans:wght@300;500;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <script src="../assets/js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase.js"></script>

  <!-- NEW: Google Identity Services (OAuth for Drive) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- NEW: jsPDF (client-side PDF generation) -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <style>
    :root { --glass: rgba(0,0,0,0.6); --glass-border: rgba(255,255,255,0.2); --electric-lime:#00FF87; --fire-orange:#ff4d00; --fire-yellow:#ffcc00; --pps-green:#066d44; }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#020605 url('../assets/images/PPS Background.png') no-repeat center center fixed;background-size:cover;color:#fff;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;padding-top:140px;padding-bottom:68px}
    body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:-1}
    nav{padding:20px 5%;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(20px);position:fixed;width:100%;top:0;z-index:1000;border-bottom:1px solid var(--glass-border)}
    .brand-name{font-family:'Syncopate',sans-serif;font-weight:700;font-size:1.4rem;letter-spacing:2px;text-transform:uppercase;color:#fff;text-shadow:0 0 5px #fff,0 0 10px #ffcc00,0 0 20px #ff4d00}
    .nav-buttons{display:flex;gap:20px}
    .nav-btn{text-decoration:none;color:#fff;font-family:'Syncopate',sans-serif;font-size:.7rem;font-weight:700;padding:10px 18px;border-radius:5px;transition:.3s;border:1px solid transparent}
    .nav-btn:hover{color:var(--electric-lime);border-color:var(--electric-lime);background:rgba(0,255,135,0.1)}
    .main-content{width:100%;display:flex;justify-content:center}
    .queue-container{width:90%;max-width:1200px;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e0e0e0;box-shadow:0 4px 20px rgba(0,0,0,0.08);color:#333}
    .queue-header-box{background:var(--pps-green);color:#fff;padding:25px 30px;display:flex;justify-content:space-between;align-items:center;font-family:'Syncopate';letter-spacing:3px}
    .queue-header-box h1{margin:0;font-size:0.9rem}
    .stats{font-size:0.75rem;background:rgba(255,255,255,0.2);padding:5px 15px;border-radius:20px;font-family:'Roboto'}
    table{width:100%;border-collapse:collapse;text-align:left}
    thead{background:#fafafa;font-family:'Syncopate';font-size:0.65rem;letter-spacing:2px;color:#888}
    th{padding:20px 30px;font-weight:700;border-bottom:1px solid #e0e0e0}
    td{padding:18px 30px;border-bottom:1px solid #eee;font-size:0.85rem;color:#333}
    tr:hover td{background:#f9f9f9}
    .ref-code{font-family:monospace;font-weight:bold;color:var(--pps-green)}
    .action-cell{display:flex;gap:10px;align-items:center}
    .btn-action{border:none;padding:8px 16px;border-radius:6px;font-size:10px;font-weight:bold;cursor:pointer;color:white;text-transform:uppercase;transition:opacity .2s}
    .activate-btn{background:#2e7d32}
    .delete-btn{background:#c62828}
    .btn-action:hover{opacity:0.8}
    footer{position:fixed;bottom:0;left:0;right:0;height:68px;background:rgba(0,0,0,0.85);border-top:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;z-index:1000}
    .footer-logo{height:30px;margin-right:15px}
    footer p{font-family:'Syncopate';font-size:0.62rem;letter-spacing:3px;opacity:0.7;color:#fff;margin:0}
  </style>
</head>
<body>
  <nav>
    <span class="brand-name">Phoenix Printing Solutions</span>
    <div class="nav-buttons">
      <a href="pendingqueue.html" class="nav-btn">PENDING QUEUE</a>
      <a href="inprogress.html" class="nav-btn">IN PROGRESS</a>
      <a href="admininvoice.html" class="nav-btn">INVOICE</a>
      <a href="archive.html" class="nav-btn">ARCHIVE</a>
      <a href="#" class="nav-btn" onclick="logoutAdmin()">LOGOUT</a>
    </div>
  </nav>

  <div class="main-content">
    <div class="queue-container">
      <div class="queue-header-box">
        <h1>ARCHIVE HISTORY</h1>
        <div class="stats" id="archiveCount">0 Items</div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Reference</th>
            <th>Client / Business Name</th>
            <th>City</th>
            <th>Units</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="archiveBody"></tbody>
      </table>
    </div>
  </div>

  <footer>
    <img src="../assets/images/PPS logo.png" alt="Logo" class="footer-logo">
    <p>© 2026 PHOENIX PRINTING SOLUTIONS</p>
  </footer>

  <script>
  (function(){

    // ======================================================================
    // ================== GOOGLE DRIVE KEYS (LINE ~210) ======================
    // Replace BOTH placeholders below with your real values.
    // NOTE: In browser (SPA) flow, the secret is NOT used. Keep it for parity.
    const GOOGLE_CLIENT_ID = "912956479100-e477eotk5kf1s3v6emp1rkamn22kln29.apps.googleusercontent.com";
    const GOOGLE_CLIENT_SECRET = "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"; // not used in browser flow
    const GOOGLE_SCOPES = [
      "https://www.googleapis.com/auth/drive.file",
      "https://www.googleapis.com/auth/userinfo.email",
      "https://www.googleapis.com/auth/userinfo.profile"
    ].join(" ");
    // ======================================================================

    // Utility: make a short code for display (unchanged)
    function abbreviate(id){ return id ? ('#PPS-' + id.slice(0,8).toUpperCase()) : '#PPS-XXXX'; }

    // ===== EXISTING: Fetch & Render (unchanged) =====
    async function fetchAndRender(){
      try{
        const { data: items, error } = await window.supabaseClient
          .from('pps_queue')
          .select('*')
          .eq('status','archived')
          .order('created_at',{ascending:false});
        if(error) throw error;
        render(items||[]);
      }catch(err){ console.error('Error fetching archive:', err); }
    }

    // ===== EXISTING: Activate (unchanged) =====
    window.activateItem = async function(id){
      try{
        const { error } = await window.supabaseClient
          .from('pps_queue')
          .update({ status:'pending', created_at: new Date().toISOString() })
          .eq('request_id', id);
        if(error) throw error;
        fetchAndRender();
      }catch(err){ console.error('Error activating item:', err); }
    }

    // ===== NEW: Finished flow =====
    // 1) Fetch request by ID
    async function fetchRequestById(id){
      const { data, error } = await window.supabaseClient
        .from('pps_queue')
        .select('*')
        .eq('request_id', id)
        .single();
      if(error) throw error;
      return data;
    }

    // 2) Generate a simple PDF with jsPDF from request data
    async function generatePdfFromRequest(req){
      const { jsPDF } = window.jspdf || {};
      if(!jsPDF){ throw new Error('jsPDF not loaded'); }
      const doc = new jsPDF({ unit:'pt', format:'a4' });

      const line = (text, y, x=50) => doc.text(String(text || ''), x, y);

      // Header
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(16);
      line('Phoenix Printing Solutions', 60);
      doc.setFontSize(12);
      doc.setFont('helvetica', 'normal');
      line('Archive Record', 80);
      doc.setDrawColor(6,109,68);
      doc.line(50, 90, 545, 90);

      // Body
      let y = 120;
      const rowGap = 18;

      const ref = abbreviate(req.request_id);
      line(`Reference: ${ref}`, y); y += rowGap;
      line(`Created: ${req.created_at || 'N/A'}`, y); y += rowGap;
      line(`Status: ${req.status || 'N/A'}`, y); y += (rowGap * 2);

      doc.setFont('helvetica', 'bold'); line('Client', y); doc.setFont('helvetica', 'normal'); y += rowGap;
      line(`Name: ${req.client?.name || 'N/A'}`, y); y += rowGap;
      line(`Email: ${req.client?.email || 'N/A'}`, y); y += rowGap;
      line(`Phone: ${req.client?.phone || 'N/A'}`, y); y += (rowGap * 2);

      doc.setFont('helvetica', 'bold'); line('Location', y); doc.setFont('helvetica', 'normal'); y += rowGap;
      line(`City: ${req.location?.city || 'N/A'}`, y); y += rowGap;
      line(`Address: ${req.location?.address || 'N/A'}`, y); y += (rowGap * 2);

      const units = Array.isArray(req.workspaces) ? req.workspaces.length : (req.workspaces?.length || 0);
      doc.setFont('helvetica', 'bold'); line('Order', y); doc.setFont('helvetica', 'normal'); y += rowGap;
      line(`Units: ${units}`, y); y += rowGap;

      // Footer
      doc.setFontSize(10);
      doc.setTextColor(120,120,120);
      line('Generated automatically for archive', 780);

      return doc.output('blob'); // Blob of PDF
    }

    // 3) Google OAuth: get Access Token (lazy-init)
    function getGoogleAccessToken(){
      return new Promise((resolve, reject) => {
        if(!window.google || !google.accounts || !google.accounts.oauth2){
          return reject(new Error('Google OAuth not loaded yet. Please wait a second and try again.'));
        }
        try{
          const tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: GOOGLE_CLIENT_ID,
            scope: GOOGLE_SCOPES,
            prompt: '', // try silent if user already granted; falls back to consent
            callback: (tokenResponse) => {
              if(tokenResponse && tokenResponse.access_token){
                resolve(tokenResponse.access_token);
              } else {
                reject(new Error('No access token returned'));
              }
            }
          });
          tokenClient.requestAccessToken();
        }catch(e){
          reject(e);
        }
      });
    }

    // 4) Upload PDF Blob to Google Drive using multipart upload
    async function uploadToGoogleDrive(pdfBlob, fileName, accessToken){
      const metadata = {
        name: fileName,
        mimeType: 'application/pdf'
        // To upload into a specific folder, add: parents: ['YOUR_FOLDER_ID']
      };

      const boundary = '-------PPSArchiveBoundary' + Math.random().toString(36).slice(2);
      const delimiter = '--' + boundary + '\r\n';
      const closeDelim = '--' + boundary + '--';

      const body = new Blob([
        delimiter,
        'Content-Type: application/json; charset=UTF-8\r\n\r\n',
        JSON.stringify(metadata) + '\r\n',
        delimiter,
        'Content-Type: application/pdf\r\n\r\n',
        pdfBlob,
        '\r\n' + closeDelim
      ], { type: 'multipart/related; boundary=' + boundary });

      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + accessToken,
          'Content-Type': 'multipart/related; boundary=' + boundary
        },
        body
      });

      if(!res.ok){
        const t = await res.text().catch(()=> '');
        throw new Error('Drive upload failed: ' + res.status + ' ' + t);
      }
      return res.json();
    }

    // 5) Public handler: Finished
    window.finishItem = async function(id){
      // Optional minimal UX feedback without changing design:
      const btn = document.querySelector(`button[onclick="finishItem('${id}')"]`);
      if(btn){ btn.disabled = true; btn.style.opacity = 0.7; btn.textContent = 'Finishing…'; }

      try{
        // a) Fetch the full request
        const req = await fetchRequestById(id);

        // b) Generate PDF
        const fileName = `PPS-${(id||'').slice(0,8).toUpperCase() || 'XXXX'}.pdf`;
        const pdfBlob = await generatePdfFromRequest(req);

        // c) Google sign-in & token
        const token = await getGoogleAccessToken();

        // d) Upload to Google Drive
        await uploadToGoogleDrive(pdfBlob, fileName, token);

        // e) Remove from queue (delete row)
        const { error: delErr } = await window.supabaseClient
          .from('pps_queue')
          .delete()
          .eq('request_id', id);
        if(delErr) throw delErr;

        // f) Refresh UI
        await fetchAndRender();

        if(btn){ btn.textContent = 'Finished'; }
        alert('Saved to Google Drive and removed from queue.');
      }catch(err){
        console.error('Finish error:', err);
        if(btn){ btn.textContent = 'Finished'; btn.disabled = false; btn.style.opacity = 1; }
        alert('Could not finish: ' + (err?.message || err));
      }
    }

    // ===== EXISTING: Render (ONLY the Delete button changed to Finished) =====
    function render(data){
      var tbody=document.getElementById('archiveBody');
      var countLabel=document.getElementById('archiveCount');
      if(!tbody) return;
      tbody.innerHTML='';
      countLabel.innerText = data.length + ' Archived Items';

      if(data.length===0){
        tbody.innerHTML='<tr><td colspan="5" style="text-align:center; padding:50px; opacity:0.5;">No archived items.</td></tr>';
        return;
      }

      data.forEach(function(req){
        var tr=document.createElement('tr');
        tr.innerHTML=`
          <td class="ref-code">${abbreviate(req.request_id)}</td>
          <td><strong>${req.client?.name || 'N/A'}</strong></td>
          <td>${req.location?.city || 'N/A'}</td>
          <td>${req.workspaces?.length || 0} Units</td>
          <td>
            <div class="action-cell">
              <button class="btn-action activate-btn" onclick="activateItem('${ (unchanged) =====
    function subscribeToChanges(){
      window.supabaseClient
        .channel('pps_queue_changes_archive')
        .on('postgres_changes',{event:'*',table:'pps_queue'},() => fetchAndRender())
        .subscribe();
    }

    // ===== INIT =====
    document.addEventListener('DOMContentLoaded',() => {
      fetchAndRender();
      subscribeToChanges();
    });

  })();
  </script>
</body>
</html>
