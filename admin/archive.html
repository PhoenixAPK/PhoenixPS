<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phoenix Printing Solutions | Redefine Your Space</title>
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Plus+Jakarta+Sans:wght@300;500;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="../assets/js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root { --glass: rgba(0,0,0,0.6); --glass-border: rgba(255,255,255,0.2); --electric-lime:#00FF87; --fire-orange:#ff4d00; --fire-yellow:#ffcc00; --pps-green:#066d44; --pps-admin-green:#046C4E; }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#020605 url('../assets/images/PPS Background.png') no-repeat center center fixed;background-size:cover;color:#fff;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;padding-top:140px;padding-bottom:68px}
    body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:-1}
    nav{padding:20px 5%;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(20px);position:fixed;width:100%;top:0;z-index:1000;border-bottom:1px solid var(--glass-border)}
    .brand-name{font-family:'Syncopate',sans-serif;font-weight:700;font-size:1.4rem;letter-spacing:2px;text-transform:uppercase;color:#fff;text-shadow:0 0 5px #fff,0 0 10px #ffcc00,0 0 20px #ff4d00}
    .nav-buttons{display:flex;gap:20px}
    .nav-btn{text-decoration:none;color:#fff;font-family:'Syncopate',sans-serif;font-size:.7rem;font-weight:700;padding:10px 18px;border-radius:5px;transition:.3s;border:1px solid transparent}
    .nav-btn:hover{color:var(--electric-lime);border-color:var(--electric-lime);background:rgba(0,255,135,0.1)}
    .main-content{width:100%;display:flex;justify-content:center}
    .queue-container{width:90%;max-width:1200px;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e0e0e0;box-shadow:0 4px 20px rgba(0,0,0,0.08);color:#333}
    .queue-header-box{background:var(--pps-green);color:#fff;padding:25px 30px;display:flex;justify-content:space-between;align-items:center;font-family:'Syncopate';letter-spacing:3px}
    .queue-header-box h1{margin:0;font-size:0.9rem}
    .stats{font-size:0.75rem;background:rgba(255,255,255,0.2);padding:5px 15px;border-radius:20px;font-family:'Roboto'}
    table{width:100%;border-collapse:collapse;text-align:left}
    thead{background:#fafafa;font-family:'Syncopate';font-size:0.65rem;letter-spacing:2px;color:#888}
    th{padding:20px 30px;font-weight:700;border-bottom:1px solid #e0e0e0}
    td{padding:18px 30px;border-bottom:1px solid #eee;font-size:0.85rem;color:#333}
    tr:hover td{background:#f9f9f9}
    .ref-code{font-family:monospace;font-weight:bold;color:var(--pps-green)}
    .action-cell{display:flex;gap:10px;align-items:center}
    .btn-action{border:none;padding:8px 16px;border-radius:6px;font-size:10px;font-weight:bold;cursor:pointer;color:white;text-transform:uppercase;transition:opacity .2s}
    .activate-btn{background:#2e7d32}
    .delete-btn{background:#c62828}
    .btn-action:hover{opacity:0.8}
    footer{position:fixed;bottom:0;left:0;right:0;height:68px;background:rgba(0,0,0,0.85);border-top:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;z-index:1000}
    .footer-logo{height:30px;margin-right:15px}
    footer p{font-family:'Syncopate';font-size:0.62rem;letter-spacing:3px;opacity:0.7;color:#fff;margin:0}

    /* HIDDEN RENDER AREA FOR PDF GENERATION */
    #hiddenInvoiceWrap { position: absolute; left: -9999px; top: 0; width: 800px; color: #333; }
    .invoice-container { padding: 30px; background: #ffffff; border-radius: 12px; }
    .invoice-header { text-align: center; margin-bottom: 8px; display: flex; flex-direction: column; align-items: center; }
    .invoice-header img { max-height: 60px; margin-bottom: 8px; }
    .invoice-header h1 { margin: 0; font-size: 22px; font-weight: 700; color: var(--pps-admin-green); }
    .invoice-title { text-align: center; font-weight: 700; font-size: 18px; margin: 20px 0 8px; text-transform: uppercase; color: var(--pps-admin-green); }
    .invoice-client-info { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
    .invoice-client-line { display: flex; justify-content: center; width: 100%; max-width: 350px; font-size: 14px; color: #444; line-height: 1.6; }
    .invoice-client-label { width: 110px; text-align: right; font-weight: 700; margin-right: 10px; font-size: 13px; }
    .invoice-client-value { text-align: left; flex: 1; font-size: 13px; }
    .invoice-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    .invoice-table th, .invoice-table td { border: 1px solid #e0e0e0; padding: 8px; text-align: center; font-size: 12px; }
    .invoice-table th { background: var(--pps-admin-green); color: #fff; font-weight: 700; }
    .invoice-table td.total { font-weight: bold; background: #cdeacf; color: #333; }
    .invoice-additional-costs { width: 50%; margin-left: auto; font-size: 13px; margin-bottom: 20px; }
    .invoice-additional-costs table { width: 100%; border: none; }
    .invoice-additional-costs td { padding: 6px; text-align: left; border: none; }
    .invoice-additional-costs td.value { text-align: right; }
    .invoice-grand-total { font-weight: bold; background: #cdeacf; text-align: right; padding: 8px; margin-top: 8px; font-size: 14px; }
    .invoice-footer { display: flex; font-size: 11px; justify-content: center; gap: 15px; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; color: #666; }
  </style>
</head>
<body>
  <nav>
    <span class="brand-name">Phoenix Printing Solutions</span>
    <div class="nav-buttons">
      <a href="pendingqueue.html" class="nav-btn">PENDING QUEUE</a>
      <a href="inprogress.html" class="nav-btn">IN PROGRESS</a>
      <a href="admininvoice.html" class="nav-btn">INVOICE</a>
      <a href="archive.html" class="nav-btn">ARCHIVE</a>
      <a href="#" class="nav-btn" onclick="logoutAdmin()">LOGOUT</a>
    </div>
  </nav>

  <div class="main-content">
    <div class="queue-container">
      <div class="queue-header-box">
        <h1>ARCHIVE HISTORY</h1>
        <div class="stats" id="archiveCount">0 Items</div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Reference</th>
            <th>Client / Business Name</th>
            <th>City</th>
            <th>Units</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="archiveBody"></tbody>
      </table>
    </div>
  </div>

  <div id="hiddenInvoiceWrap"></div>

  <footer>
    <img src="../assets/images/PPS logo.png" alt="Logo" class="footer-logo">
    <p>© 2026 PHOENIX PRINTING SOLUTIONS</p>
  </footer>

  <script>
  (function(){
    const LOGO_PATH = '../assets/images/PPS logo.png';

    async function generateVisualInvoicePDF(req) {
      const isEnt = req.is_entrepreneur || false;
      const basePrice = isEnt ? 200 : 250;
      const city = req.location?.city || "Rabat";
      const phone = req.client?.phone || req.business?.phone || "N/A";
      
      let totalChargeArea = 0;
      const rowsHtml = (req.workspaces || []).map((ws, i) => {
        const h = parseFloat(ws.height) || 0;
        const w = parseFloat(ws.width) || 0;
        const actual = h * w;
        let charge = 0;
        if(actual > 0){
          if(actual <= 1) charge = 1;
          else if(actual <= 1.49) charge = 1.5;
          else if(actual <= 1.99) charge = 2;
          else charge = Math.ceil(actual * 2) / 2;
        }
        totalChargeArea += charge;
        return `<tr><td>Workspace ${i+1}</td><td>${h.toFixed(2)}x${w.toFixed(2)}</td><td>${actual.toFixed(2)}</td><td>${charge.toFixed(2)}</td><td>${basePrice.toFixed(2)}</td><td>${(charge*basePrice).toFixed(2)}</td></tr>`;
      }).join('');

      const baseCost = totalArea = totalChargeArea * basePrice;
      const travel = (parseFloat(req.costs?.fuelPrice) || 0) + (parseFloat(req.costs?.tollPrice) || 0) + (parseFloat(req.costs?.accommodationPrice) || 0);
      const grand = baseCost + travel;

      const wrap = document.getElementById('hiddenInvoiceWrap');
      wrap.innerHTML = `
        <div class="invoice-container">
          <div class="invoice-header"><img src="${LOGO_PATH}" alt="Logo" /><h1>Phoenix Printing Solutions</h1></div>
          <div class="invoice-title">Invoice: ${isEnt ? 'Business' : 'Client'} - ${req.client?.name || 'Customer'}</div>
          <div class="invoice-client-info">
            <div class="invoice-client-line"><div class="invoice-client-label">${isEnt ? 'Business Name:' : 'Client Name:'}</div><div class="invoice-client-value">${req.client?.name || 'N/A'}</div></div>
            <div class="invoice-client-line"><div class="invoice-client-label">Phone:</div><div class="invoice-client-value">${phone}</div></div>
            <div class="invoice-client-line"><div class="invoice-client-label">City:</div><div class="invoice-client-value">${city}</div></div>
          </div>
          <table class="invoice-table">
            <thead><tr><th>Item</th><th>Size</th><th>Actual</th><th>Charge</th><th>Price</th><th>Cost</th></tr></thead>
            <tbody>${rowsHtml}<tr class="total"><td colspan="3">Total Area</td><td>${totalChargeArea.toFixed(2)}</td><td></td><td>${baseCost.toFixed(2)}</td></tr></tbody>
          </table>
          <div class="invoice-additional-costs">
            <table>
              <tr><td>Travel Total</td><td class="value">${travel.toFixed(2)} DH</td></tr>
              <tr style="font-weight:bold; background:#cdeacf;"><td style="padding:10px;">GRAND TOTAL</td><td class="value" style="padding:10px;">${grand.toFixed(2)} DH</td></tr>
            </table>
          </div>
          <div class="invoice-footer"><div>Phoenix Printing Solutions</div><div>0667336303</div></div>
        </div>`;

      const canvas = await html2canvas(wrap, { scale: 2 });
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'mm', 'a4');
      pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
      return pdf.output("blob");
    }

    async function uploadPdfToSupabase(req, pdfBlob) {
      const cleanName = (req.client?.name || "Customer").replace(/[^a-z0-9]/gi, '_');
      const cleanCity = (req.location?.city || "City").replace(/[^a-z0-9]/gi, '_');
      const fileName = `PPS-${cleanName}-${cleanCity}-${req.request_id.slice(0, 5).toUpperCase()}.pdf`;

      const { data, error } = await window.supabaseClient.storage
        .from("Archive-invoice")
        .upload(`archive/${fileName}`, pdfBlob, { contentType: "application/pdf", upsert: true });
      if (error) throw error;
      return data;
    }

    window.finishItem = async function(id) {
      try {
        const { data: req, error } = await window.supabaseClient.from("pps_queue").select("*").eq("request_id", id).single();
        if (error) throw error;
        const pdfBlob = await generateVisualInvoicePDF(req);
        await uploadPdfToSupabase(req, pdfBlob);
        const { error: delErr } = await window.supabaseClient.from("pps_queue").delete().eq("request_id", id);
        if (delErr) throw delErr;
        fetchAndRender();
        alert("Archived and PDF saved successfully.");
      } catch (err) { alert("Error finishing item."); }
    };

    window.activateItem = async function(id){
      try{
        const { error } = await window.supabaseClient.from('pps_queue').update({ status:'pending', created_at: new Date().toISOString() }).eq('request_id', id);
        if(error) throw error;
        fetchAndRender();
      } catch(err){ alert("Error activating item."); }
    }

    async function fetchAndRender(){
      const { data: items } = await window.supabaseClient.from('pps_queue').select('*').eq('status','archived').order('created_at',{ascending:false});
      render(items||[]);
    }

    function render(data){
      var tbody=document.getElementById('archiveBody');
      var countLabel=document.getElementById('archiveCount');
      if(!tbody) return;
      tbody.innerHTML='';
      countLabel.innerText = data.length + ' Items';
      data.forEach(function(req){
        var tr=document.createElement('tr');
        tr.innerHTML=`
          <td class="ref-code">#${req.request_id.slice(0,8).toUpperCase()}</td>
          <td><strong>${req.client?.name || 'N/A'}</strong></td>
          <td>${req.location?.city || 'N/A'}</td>
          <td>${req.workspaces?.length || 0} Units</td>
          <td>
            <div class="action-cell">
              <button class="btn-action activate-btn" onclick="activateItem('${req.request_id}')">Activate</button>
              <button class="btn-action delete-btn" onclick="finishItem('${req.request_id}')">Finished</button>
            </div>
          </td>`;
        tbody.appendChild(tr);
      });
    }

    document.addEventListener('DOMContentLoaded', fetchAndRender);
  })();
  </script>
</body>
</html>
