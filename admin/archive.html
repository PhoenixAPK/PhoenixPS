<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phoenix Printing Solutions | Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Plus+Jakarta+Sans:wght@300;500;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root { --glass: rgba(0,0,0,0.6); --glass-border: rgba(255,255,255,0.2); --pps-green:#066d44; --pps-admin-green:#046C4E; }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#020605 url('../assets/images/PPS Background.png') no-repeat center center fixed;background-size:cover;color:#fff;padding-top:140px;padding-bottom:68px}
    nav{padding:20px 5%;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(20px);position:fixed;width:100%;top:0;z-index:1000;border-bottom:1px solid var(--glass-border)}
    .brand-name{font-family:'Syncopate',sans-serif;font-weight:700;font-size:1.4rem;letter-spacing:2px;text-transform:uppercase;color:#fff;text-shadow:0 0 5px #fff,0 0 10px #ffcc00,0 0 20px #ff4d00}
    .nav-btn{text-decoration:none;color:#fff;font-family:'Syncopate',sans-serif;font-size:.7rem;font-weight:700;padding:10px 18px;border-radius:5px;border:1px solid transparent}
    .queue-container{width:90%;max-width:1200px;background:#fff;border-radius:12px;margin:auto;color:#333;overflow:hidden}
    .queue-header-box{background:var(--pps-green);color:#fff;padding:25px 30px;display:flex;justify-content:space-between;align-items:center;font-family:'Syncopate'}
    table{width:100%;border-collapse:collapse}
    th,td{padding:20px 30px;border-bottom:1px solid #eee;text-align:left}
    .btn-action{border:none;padding:8px 16px;border-radius:6px;font-weight:bold;cursor:pointer;color:white;text-transform:uppercase}
    .activate-btn{background:#2e7d32} .delete-btn{background:#c62828}

    /* PDF RENDER STYLES - IDENTICAL TO ADMIN */
    #hiddenInvoiceWrap { position: absolute; left: -9999px; top: 0; width: 800px; background: #fff; color: #333; }
    .invoice-container { padding: 40px; }
    .invoice-header { text-align: center; border-bottom: 2px solid var(--pps-admin-green); padding-bottom: 20px; }
    .invoice-header h1 { font-family: 'Syncopate'; font-size: 22px; color: var(--pps-admin-green); }
    .invoice-info-grid { display: flex; justify-content: space-between; margin: 30px 0; }
    .info-col { font-size: 14px; line-height: 1.6; }
    .info-label { font-weight: 800; color: var(--pps-admin-green); width: 120px; display: inline-block; }
    .pdf-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
    .pdf-table th { background: var(--pps-admin-green); color: #fff; padding: 12px; font-size: 12px; }
    .pdf-table td { border: 1px solid #ddd; padding: 12px; text-align: center; font-size: 12px; }
    .pdf-total-row { background: #f0fdf4; font-weight: bold; }
    .grand-total-box { text-align: right; padding: 20px; background: #046C4E; color: #fff; border-radius: 8px; margin-top: 20px; }
  </style>
</head>
<body>
  <nav>
    <span class="brand-name">Phoenix Printing Solutions</span>
    <div class="nav-buttons">
      <a href="archive.html" class="nav-btn">ARCHIVE</a>
      <a href="#" class="nav-btn" onclick="logoutAdmin()">LOGOUT</a>
    </div>
  </nav>

  <div class="queue-container">
    <div class="queue-header-box">
      <h1>ARCHIVE HISTORY</h1>
      <div id="archiveCount">0 Items</div>
    </div>
    <table>
      <thead><tr><th>Reference</th><th>Client</th><th>City</th><th>Units</th><th>Action</th></tr></thead>
      <tbody id="archiveBody"></tbody>
    </table>
  </div>

  <div id="hiddenInvoiceWrap"></div>

  <script>
    const LOGO_PATH = '../assets/images/PPS logo.png';

    async function generateVisualInvoicePDF(req) {
      const isEnt = req.is_entrepreneur || false;
      const basePrice = isEnt ? 200 : 250;
      const city = req.location?.city || "Rabat";
      const phone = req.client?.phone || req.business?.phone || "N/A";
      
      let totalArea = 0;
      const rows = (req.workspaces || []).map((ws, i) => {
        const area = (parseFloat(ws.height) * parseFloat(ws.width)) || 0;
        let charge = area <= 1 ? 1 : area <= 1.5 ? 1.5 : area <= 2 ? 2 : Math.ceil(area * 2) / 2;
        totalArea += charge;
        return `<tr><td>WS ${i+1}</td><td>${ws.height}x${ws.width}</td><td>${area.toFixed(2)}</td><td>${charge.toFixed(2)}</td><td>${basePrice}</td><td>${(charge*basePrice).toFixed(2)}</td></tr>`;
      }).join('');

      const travel = (parseFloat(req.costs?.fuelPrice) || 0) + (parseFloat(req.costs?.tollPrice) || 0);
      const grandTotal = (totalArea * basePrice) + travel;

      document.getElementById('hiddenInvoiceWrap').innerHTML = `
        <div class="invoice-container">
          <div class="invoice-header"><h1>PHOENIX PRINTING SOLUTIONS</h1></div>
          <div class="invoice-info-grid">
            <div class="info-col">
              <div><span class="info-label">${isEnt ? 'BUSINESS' : 'CLIENT'}:</span> ${req.client?.name || 'Customer'}</div>
              <div><span class="info-label">PHONE:</span> ${phone}</div>
              <div><span class="info-label">CITY:</span> ${city}</div>
            </div>
          </div>
          <table class="pdf-table">
            <thead><tr><th>ITEM</th><th>SIZE</th><th>ACTUAL</th><th>CHARGE</th><th>PRICE</th><th>COST</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
          <div class="grand-total-box">
            <div>TRAVEL: ${travel.toFixed(2)} DH</div>
            <div style="font-size: 20px; margin-top:10px;">GRAND TOTAL: ${grandTotal.toFixed(2)} DH</div>
          </div>
        </div>`;

      const canvas = await html2canvas(document.getElementById('hiddenInvoiceWrap'), { scale: 2 });
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'mm', 'a4');
      pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
      return pdf.output("blob");
    }

    async function finishItem(id) {
      try {
        const { data: req } = await window.supabaseClient.from("pps_queue").select("*").eq("request_id", id).single();
        const pdfBlob = await generateVisualInvoicePDF(req);
        
        const cleanName = (req.client?.name || "User").replace(/[^a-z0-9]/gi, '_');
        const fileName = `PPS-${cleanName}-${id.slice(0,5)}.pdf`;

        await window.supabaseClient.storage.from("Archive-invoice").upload(`archive/${fileName}`, pdfBlob, { upsert: true });
        await window.supabaseClient.from("pps_queue").delete().eq("request_id", id);
        
        location.reload();
      } catch (err) { alert("Error finishing item."); }
    }

    async function fetchAndRender() {
      const { data } = await window.supabaseClient.from('pps_queue').select('*').eq('status','archived');
      const tbody = document.getElementById('archiveBody');
      tbody.innerHTML = data.map(req => `
        <tr>
          <td>#${req.request_id.slice(0,8)}</td>
          <td>${req.client?.name || 'N/A'}</td>
          <td>${req.location?.city || 'N/A'}</td>
          <td>${req.workspaces?.length || 0} Units</td>
          <td>
            <button class="btn-action activate-btn" onclick="finishItem('${req.request_id}')">FINISHED</button>
          </td>
        </tr>`).join('');
    }

    document.addEventListener('DOMContentLoaded', fetchAndRender);
  </script>
</body>
</html>
