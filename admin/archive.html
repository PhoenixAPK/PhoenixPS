<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phoenix Printing Solutions | Redefine Your Space</title>
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Plus+Jakarta+Sans:wght@300;500;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="../assets/js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root { --glass: rgba(0,0,0,0.6); --glass-border: rgba(255,255,255,0.2); --electric-lime:#00FF87; --fire-orange:#ff4d00; --fire-yellow:#ffcc00; --pps-green:#066d44; }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#020605 url('../assets/images/PPS Background.png') no-repeat center center fixed;background-size:cover;color:#fff;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;padding-top:140px;padding-bottom:68px}
    body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:-1}
    nav{padding:20px 5%;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(20px);position:fixed;width:100%;top:0;z-index:1000;border-bottom:1px solid var(--glass-border)}
    .brand-name{font-family:'Syncopate',sans-serif;font-weight:700;font-size:1.4rem;letter-spacing:2px;text-transform:uppercase;color:#fff;text-shadow:0 0 5px #fff,0 0 10px #ffcc00,0 0 20px #ff4d00}
    .nav-buttons{display:flex;gap:20px}
    .nav-btn{text-decoration:none;color:#fff;font-family:'Syncopate',sans-serif;font-size:.7rem;font-weight:700;padding:10px 18px;border-radius:5px;transition:.3s;border:1px solid transparent}
    .nav-btn:hover{color:var(--electric-lime);border-color:var(--electric-lime);background:rgba(0,255,135,0.1)}
    .main-content{width:100%;display:flex;justify-content:center}
    .queue-container{width:90%;max-width:1200px;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e0e0e0;box-shadow:0 4px 20px rgba(0,0,0,0.08);color:#333}
    .queue-header-box{background:var(--pps-green);color:#fff;padding:25px 30px;display:flex;justify-content:space-between;align-items:center;font-family:'Syncopate';letter-spacing:3px}
    .queue-header-box h1{margin:0;font-size:0.9rem}
    .stats{font-size:0.75rem;background:rgba(255,255,255,0.2);padding:5px 15px;border-radius:20px;font-family:'Roboto'}
    table{width:100%;border-collapse:collapse;text-align:left}
    thead{background:#fafafa;font-family:'Syncopate';font-size:0.65rem;letter-spacing:2px;color:#888}
    th{padding:20px 30px;font-weight:700;border-bottom:1px solid #e0e0e0}
    td{padding:18px 30px;border-bottom:1px solid #eee;font-size:0.85rem;color:#333}
    tr:hover td{background:#f9f9f9}
    .ref-code{font-family:monospace;font-weight:bold;color:var(--pps-green)}
    .action-cell{display:flex;gap:10px;align-items:center}
    .btn-action{border:none;padding:8px 16px;border-radius:6px;font-size:10px;font-weight:bold;cursor:pointer;color:white;text-transform:uppercase;transition:opacity .2s}
    .activate-btn{background:#2e7d32}
    .delete-btn{background:#c62828}
    .btn-action:hover{opacity:0.8}
    footer{position:fixed;bottom:0;left:0;right:0;height:68px;background:rgba(0,0,0,0.85);border-top:1px solid var(--glass-border);display:flex;align-items:center;justify-content:center;z-index:1000}
    .footer-logo{height:30px;margin-right:15px}
    footer p{font-family:'Syncopate';font-size:0.62rem;letter-spacing:3px;opacity:0.7;color:#fff;margin:0}
  </style>
</head>
<body>
  <nav>
    <span class="brand-name">Phoenix Printing Solutions</span>
    <div class="nav-buttons">
      <a href="pendingqueue.html" class="nav-btn">PENDING QUEUE</a>
      <a href="inprogress.html" class="nav-btn">IN PROGRESS</a>
      <a href="admininvoice.html" class="nav-btn">INVOICE</a>
      <a href="archive.html" class="nav-btn">ARCHIVE</a>
      <a href="#" class="nav-btn" onclick="logoutAdmin()">LOGOUT</a>
    </div>
  </nav>
  <div class="main-content">
    <div class="queue-container">
      <div class="queue-header-box">
        <h1>ARCHIVE HISTORY</h1>
        <div class="stats" id="archiveCount">0 Items</div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Reference</th>
            <th>Client / Business Name</th>
            <th>City</th>
            <th>Units</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="archiveBody"></tbody>
      </table>
    </div>
  </div>
  <footer>
    <img src="../assets/images/PPS logo.png" alt="Logo" class="footer-logo">
    <p>© 2026 PHOENIX PRINTING SOLUTIONS</p>
  </footer>
  <script>
  (function(){
    /* ============================================================
       BLOCK 1 — Detailed Invoice PDF Generator
       ============================================================ */
    async function generateDetailedInvoicePDF(req) {
      // Corrected destructuring for version 2.5.1
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ unit: "pt", format: "a4" });

      pdf.setFont("helvetica", "bold");
      pdf.setFontSize(22);
      pdf.text("PHOENIX PRINTING SOLUTIONS", 40, 50);

      pdf.setFontSize(12);
      pdf.setFont("helvetica", "normal");
      pdf.text("Archive Invoice Document", 40, 70);

      pdf.setDrawColor(6, 109, 68);
      pdf.setLineWidth(1.2);
      pdf.line(40, 80, 550, 80);

      let y = 120;
      pdf.setFont("helvetica", "bold");
      pdf.setFontSize(14);
      pdf.text("REFERENCE DETAILS", 40, y);
      y += 25;

      pdf.setFont("helvetica", "normal");
      pdf.setFontSize(12);
      pdf.text(`Request ID: ${req.request_id || "N/A"}`, 40, y); y += 18;
      pdf.text(`Created: ${req.created_at || "N/A"}`, 40, y); y += 18;
      pdf.text(`Status: ${req.status || "archived"}`, 40, y); y += 30;

      pdf.setFont("helvetica", "bold");
      pdf.setFontSize(14);
      pdf.text("CLIENT / BUSINESS INFORMATION", 40, y);
      y += 25;

      pdf.setFont("helvetica", "normal");
      pdf.setFontSize(12);
      pdf.text(`Name: ${req.client?.name || "N/A"}`, 40, y); y += 18;
      pdf.text(`Email: ${req.client?.email || "N/A"}`, 40, y); y += 18;
      pdf.text(`Phone: ${req.client?.phone || "N/A"}`, 40, y); y += 30;

      pdf.setFont("helvetica", "bold");
      pdf.setFontSize(14);
      pdf.text("LOCATION", 40, y);
      y += 25;

      pdf.setFont("helvetica", "normal");
      pdf.setFontSize(12);
      pdf.text(`City: ${req.location?.city || "N/A"}`, 40, y); y += 18;
      pdf.text(`Address: ${req.location?.address || "N/A"}`, 40, y); y += 30;

      pdf.setFont("helvetica", "bold");
      pdf.setFontSize(14);
      pdf.text("WORKSPACES", 40, y);
      y += 25;

      const units = Array.isArray(req.workspaces) ? req.workspaces.length : (req.workspaces?.length || 0);
      pdf.setFont("helvetica", "normal");
      pdf.setFontSize(12);
      pdf.text(`Total Units: ${units}`, 40, y);
      y += 30;

      if (Array.isArray(req.workspaces)) {
        req.workspaces.forEach((ws, index) => {
          pdf.text(`• Workspace #${index + 1}: ${ws.type || "Unit"}`, 55, y);
          y += 18;
          if (y > 750) { pdf.addPage(); y = 50; }
        });
      }

      pdf.setFontSize(10);
      pdf.setTextColor(120, 120, 120);
      pdf.text("Generated automatically by Phoenix Printing Solutions - Archive System", 40, 820);

      return pdf.output("blob");
    }

    /* ============================================================
       BLOCK 2 — Upload PDF to Supabase Storage
       ============================================================ */
    async function uploadPdfToSupabase(id, pdfBlob) {
      const filePath = `archive/${id}.pdf`;
      const { data, error } = await window.supabaseClient.storage
        .from("Archive-invoice")
        .upload(filePath, pdfBlob, {
          contentType: "application/pdf",
          upsert: true
        });
      if (error) throw error;
      return data;
    }

    /* ============================================================
       BLOCK 3 — Finished Button Logic
       ============================================================ */
    window.finishItem = async function(id) {
      try {
        const { data: req, error } = await window.supabaseClient
          .from("pps_queue")
          .select("*")
          .eq("request_id", id)
          .single();

        if (error) throw error;
        const pdfBlob = await generateDetailedInvoicePDF(req);
        await uploadPdfToSupabase(id, pdfBlob);

        const { error: delErr } = await window.supabaseClient
          .from("pps_queue")
          .delete()
          .eq("request_id", id);

        if (delErr) throw delErr;
        fetchAndRender();
        alert("Archived invoice saved successfully.");
      } catch (err) {
        console.error("Finished error:", err);
        alert("Error finishing request.");
      }
    };

    function abbreviate(id){ return id ? ('#PPS-' + id.slice(0,8).toUpperCase()) : '#PPS-XXXX'; }
    
    async function fetchAndRender(){
      try{
        const { data: items, error } = await window.supabaseClient
          .from('pps_queue')
          .select('*')
          .eq('status','archived')
          .order('created_at',{ascending:false});
        if(error) throw error;
        render(items||[]);
      }catch(err){ console.error('Error fetching archive:', err); }
    }

    window.activateItem = async function(id){
      try{
        const { error } = await window.supabaseClient
          .from('pps_queue')
          .update({ status:'pending', created_at: new Date().toISOString() })
          .eq('request_id', id);
        if(error) throw error;
        fetchAndRender();
      }catch(err){ console.error('Error activating item:', err); }
    }

    function render(data){
      var tbody=document.getElementById('archiveBody');
      var countLabel=document.getElementById('archiveCount');
      if(!tbody) return;
      tbody.innerHTML='';
      countLabel.innerText = data.length + ' Archived Items';
      if(data.length===0){
        tbody.innerHTML='<tr><td colspan="5" style="text-align:center; padding:50px; opacity:0.5;">No archived items.</td></tr>';
        return;
      }
      data.forEach(function(req){
        var tr=document.createElement('tr');
        tr.innerHTML=`
          <td class="ref-code">${abbreviate(req.request_id)}</td>
          <td><strong>${req.client?.name || 'N/A'}</strong></td>
          <td>${req.location?.city || 'N/A'}</td>
          <td>${req.workspaces?.length || 0} Units</td>
          <td>
            <div class="action-cell">
              <button class="btn-action activate-btn" onclick="activateItem('${req.request_id}')">Activate</button>
              <button class="btn-action delete-btn" onclick="finishItem('${req.request_id}')">Finished</button>
            </div>
          </td>`;
        tbody.appendChild(tr);
      });
    }

    function subscribeToChanges(){
      window.supabaseClient
        .channel('pps_queue_changes_archive')
        .on('postgres_changes',{event:'*',table:'pps_queue'},()=>fetchAndRender())
        .subscribe();
    }
    document.addEventListener('DOMContentLoaded',()=>{ fetchAndRender(); subscribeToChanges(); });
  })();
  </script>
</body>
</html>
