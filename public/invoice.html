km: 180 }, { city: "Azrou", region: "Fès-Meknès", distance_km: 180 }, { city: "Oued Zem", region: "Béni Mellal-Khénifra", distance_km: 190 }, { city: "Ifrane", region: "Fès-Meknès", distance_km: 190 }, { city: "Sidi Bennour", region: "Casablanca-Settat", distance_km: 190 }, { city: "Fes (Fès)", region: "Fès-Meknès", distance_km: 200 }, { city: "Kasbat Tadla", region: "Béni Mellal-Khénifra", distance_km: 210 }, { city: "Moulay Yacoub", region: "Fès-Meknès", distance_km: 210 }, { city: "Sefrou", region: "Fès-Meknès", distance_km: 220 }, { city: "M'Rirt", region: "Béni Mellal-Khénifra", distance_km: 220 }, { city: "El Kelaa Des Sraghna", region: "Marrakech-Safi", distance_km: 230 }, { city: "Chefchaouen", region: "Tanger-Tétouan-Al Hoceïma", distance_km: 230 }, { city: "Fquih Ben Salah", region: "Béni Mellal-Khénifra", distance_km: 240 }, { city: "Tetouan (Tétouan)", region: "Tanger-Tétouan-Al Hoceïma", distance_km: 250 }, { city: "Ben Guerir", region: "Marrakech-Safi", distance_km: 250 }, { city: "Youssoufia", region: "Marrakech-Safi", distance_km: 250 }, { city: "Martil", region: "Tanger-Tétouan-Al Hoceïma", distance_km: 260 }, { city: "Beni Mellal", region: "Béni Mellal-Khénifra", distance_km: 270 }, { city: "M'diq", region: "Tanger-Tétouan-Al Hoceïma", distance_km: 270 }, { city: "Tangier (Tanger)", region: "Tanger-Tétouan-Al Hoceïma", distance_km: 280 }, { city: "Khenifra", region: "Béni Mellal-Khénifra", distance_km: 280 }, { city: "Taounate", region: "Fès-Meknès", distance_km: 280 }, { city: "Boulemane", region: "Fès-Meknès", distance_km: 280 }, { city: "Fnideq", region: "Tanger-Tétouan-Al Hoceïma", distance_km: 290 }, { city: "Safi", region: "Marrakech-Safi", distance_km: 320 }, { city: "Marrakesh (Marrakech)", region: "Marrakech-Safi", distance_km: 330 }, { city: "Azilal", region: "Béni Mellal-Khénifra", distance_km: 340 }, { city: "Taza", region: "Fès-Meknès", distance_km: 350 }, { city: "Midelt", region: "Drâa-Tafilalet", distance_km: 350 }, { city: "Tahannaout", region: "Marrakech-Safi", distance_km: 350 }, { city: "Chichaoua", region: "Marrakech-Safi", distance_km: 380 }, { city: "Al Hoceima", region: "Tanger-Tétouan-Al Hoceïma", distance_km: 400 }, { city: "Guercif", region: "Oriental", distance_km: 400 }, { city: "Imzouren", region: "Tanger-Tétouan-Al Hoceïma", distance_km: 410 }, { city: "Ouarzazate", region: "Drâa-Tafilalet", distance_km: 450 }, { city: "Taroudant", region: "Souss-Massa", distance_km: 470 }, { city: "Essaouira", region: "Marrakech-Safi", distance_km: 470 }, { city: "Taourirt", region: "Oriental", distance_km: 480 }, { city: "Driouch", region: "Oriental", distance_km: 480 }, { city: "Oulad Teima", region: "Souss-Massa", distance_km: 490 }, { city: "Tinghir", region: "Drâa-Tafilalet", distance_km: 490 }, { city: "Biougra", region: "Souss-Massa", distance_km: 490 }, { city: "Agadir", region: "Souss-Massa", distance_km: 500 }, { city: "Lqliaa", region: "Souss-Massa", distance_km: 500 }, { city: "Dcheira El Jihadia", region: "Souss-Massa", distance_km: 500 }, { city: "Inezgane", region: "Souss-Massa", distance_km: 505 }, { city: "Ait Melloul", region: "Souss-Massa", distance_km: 510 }, { city: "Al Aaroui", region: "Oriental", distance_km: 510 }, { city: "Nador", region: "Oriental", distance_km: 520 }, { city: "Bni Anṣār (Beni Ensar)", region: "Oriental", distance_km: 540 }, { city: "Errachidia", region: "Drâa-Tafilalet", distance_km: 550 }, { city: "Zaio", region: "Oriental", distance_km: 560 }, { city: "Tiznit", region: "Souss-Massa", distance_km: 590 }, { city: "Arfoud", region: "Drâa-Tafilalet", distance_km: 590 }, { city: "Oujda", region: "Oriental", distance_km: 600 }, { city: "Tata", region: "Souss-Massa", distance_km: 600 }, { city: "L'Aaioune Sidi Mellouk", region: "Oriental", distance_km: 600 }, { city: "Jerada", region: "Oriental", distance_km: 640 }, { city: "Zagora", region: "Drâa-Tafilalet", distance_km: 650 }, { city: "Sidi Ifni", region: "Guelmim-Oued Noun", distance_km: 670 }, { city: "Bouarfa", region: "Oriental", distance_km: 680 }, { city: "Guelmim", region: "Guelmim-Oued Noun", distance_km: 750 }, { city: "Figuig", region: "Oriental", distance_km: 750 }, { city: "Tan-Tan", region: "Guelmim-Oued Noun", distance_km: 850 }, { city: "Tarfaya", region: "Laâyoune-Sakia El Hamra", distance_km: 950 }, { city: "Smara", region: "Laâyoune-Sakia El Hamra", distance_km: 1000 }, { city: "Laâyoune", region: "Laâyoune-Sakia El Hamra", distance_km: 1050 }, { city: "Boujdour", region: "Laâyoune-Sakia El Hamra", distance_km: 1200 }, { city: "Dakhla", region: "Dakhla-Oued Ed-Dahab", distance_km: 1700 }, 
 ]; 
 function getCityData(city) { return cityData.find(item => item.city === city); } 
 function getDistance(city) { const data = getCityData(city); return data ? data.distance_km : 0; } 
 function getMandatory(distance) { 
 if (isEntrepreneur) { 
 if (distance <= 50) return 6; if (distance <= 199) return 14; if (distance <= 299) return 20; if (distance <= 400) return 30; if (distance <= 499) return 35; return 40; 
 } else { 
 if (distance <= 50) return 4; if (distance <= 199) return 10; if (distance <= 299) return 15; if (distance <= 400) return 25; if (distance <= 499) return 30; return 35; 
 } 
 } 
 function handleCity() { 
 const city = document.getElementById("clientCity").value; 
 document.getElementById("leftPictureContainer").innerHTML = ""; 
 document.getElementById("rightPictureContainer").innerHTML = ""; 
 pictureCount = 0; 
 if (!city) { 
 document.getElementById("distanceInput").value = ""; 
 document.getElementById("clientRegion").value = ""; 
 document.getElementById("mandatoryPicturesOutput").value = ""; 
 return; 
 } 
 const cityInfo = getCityData(city); 
 const dist = getDistance(city); 
 document.getElementById("distanceInput").value = dist + " km"; 
 document.getElementById("clientRegion").value = cityInfo ? cityInfo.region : ""; 
 const count = getMandatory(dist); 
 const left = Math.ceil(count / 2); 
 const right = count - left; 
 for (let i = 0; i < left; i++) addPictureRow(true, document.getElementById("leftPictureContainer")); 
 for (let i = 0; i < right; i++) addPictureRow(true, document.getElementById("rightPictureContainer")); 
 updateTotalPictureCount(); 
 } 
 function addPictureRow(isMandatory, target = null) { 
 pictureCount++; 
 const div = document.createElement("div"); 
 div.className = "picture-row"; 
 div.id = `row${pictureCount}`; 
 div.innerHTML = `<input type="number" step="0.01" class="height workspace-cell" oninput="calculateAreas()"><input type="number" step="0.01" class="width workspace-cell" oninput="calculateAreas()"><span class="actualArea workspace-cell">0.00</span><span class="chargeableArea workspace-cell">0.00</span>`; 
 if (target) target.appendChild(div); 
 else { 
 const L = document.getElementById("leftPictureContainer").children.length; 
 const R = document.getElementById("rightPictureContainer").children.length; 
 (L <= R ? document.getElementById("leftPictureContainer") : document.getElementById("rightPictureContainer")).appendChild(div); 
 updateTotalPictureCount(); 
 } 
 } 
 function updateTotalPictureCount() { 
 const city = document.getElementById("clientCity").value; 
 if (!city) { document.getElementById("mandatoryPicturesOutput").value = ""; return; } 
 const mandatory = getMandatory(getDistance(city)); 
 const total = document.querySelectorAll('.picture-row').length; 
 document.getElementById("mandatoryPicturesOutput").value = total; 
 } 
 function calculateAreas() { 
 let totalActual = 0; 
 document.querySelectorAll(".picture-row").forEach(row => { 
 const h = parseFloat(row.querySelector(".height").value) || 0; 
 const w = parseFloat(row.querySelector(".width").value) || 0; 
 const actual = h * w; 
 row.querySelector(".actualArea").innerText = actual.toFixed(2); 
 let charge = 0; 
 if (actual > 0) { 
 if (actual <= 1) charge = 1; 
 else if (actual <= 1.49) charge = 1.5; 
 else if (actual <= 1.99) charge = 2; 
 else charge = Math.ceil(actual * 2) / 2; 
 } 
 row.querySelector(".chargeableArea").innerText = charge.toFixed(2); 
 totalActual += actual; 
 }); 
 const hours = totalActual / 1; 
 const days = Math.floor(hours / 8); 
 const rem = (hours % 8).toFixed(1); 
 document.getElementById("projectDurationOutput").value = days > 0 ? `${days} Day(s), ${rem} Hour(s)` : `${hours.toFixed(1)} Hour(s)`; 
 } 
 function startClientMode() { isEntrepreneur = false; initCalc("Client Mode"); } 
 function startEntrepreneurMode() { isEntrepreneur = true; initCalc("Entrepreneur Mode"); } 
 function initCalc(label) { 
 document.getElementById("modePage").style.display = "none"; 
 document.getElementById("calculatorPage").style.display = "block"; 
 document.getElementById("modeLabel").innerText = label; 
 document.getElementById("calculatorPageLogo").src = LOGO_PATH; 

 // Update labels based on mode 
  if (isEntrepreneur) { 
    document.getElementById("labelName").innerText = "Business Name:"; 
    document.getElementById("labelContact").innerText = "Business Phone:"; 
    document.getElementById("labelEmail").innerText = "Business Email:";
    document.getElementById("labelAddress").innerText = "Business Address:"; 
  } else { 
    document.getElementById("labelName").innerText = "Client Name:"; 
    document.getElementById("labelContact").innerText = "Client Phone:"; 
    document.getElementById("labelEmail").innerText = "Client Email:";
    document.getElementById("labelAddress").innerText = "Client Address:"; 
  }

 const select = document.getElementById("clientCity"); 
 select.innerHTML = '<option value="">Select City</option>'; 
 cityData.sort((a,b)=>a.city.localeCompare(b.city)).forEach(c => { 
 const opt = document.createElement("option"); opt.value = c.city; opt.text = c.city; select.add(opt); 
 }); 
 select.onchange = handleCity; 
 } 
 function returnToMode() { 
 document.getElementById("calculatorPage").style.display = "none"; 
 document.getElementById("modePage").style.display = "flex"; 
 document.getElementById("leftPictureContainer").innerHTML = ""; 
 document.getElementById("rightPictureContainer").innerHTML = ""; 
 document.getElementById("mandatoryPicturesOutput").value = ""; 
 document.getElementById("clientRegion").value = ""; 
 } 
 </script> 

<script>
(function(){
  function uuidv4(){return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){var r=Math.random()*16|0,v=c=='x'?r:(r&0x3|0x8);return v.toString(16);});}
  function buildPayload(){
    if(typeof calculateAreas==='function'){ calculateAreas(); }
    var rows = Array.from(document.querySelectorAll('.picture-row'));
    var workspaces = rows.map(function(r){
      return {
        height: parseFloat(r.querySelector('.height')?.value)||0,
        width: parseFloat(r.querySelector('.width')?.value)||0,
        actual_area: parseFloat(r.querySelector('.actualArea')?.innerText)||0,
        chargeable_area: parseFloat(r.querySelector('.chargeableArea')?.innerText)||0
      };
    });
    var id = uuidv4();
    var mode = (isEntrepreneur? 'entrepreneur':'client');
    var distStr = document.getElementById('distanceInput')?.value||'0 km';
    var distance_km = parseFloat(distStr)||0;
    return {
      request_id: id,
      status: 'pending',
      sourceMode: mode, // This tags the request with the current active mode
      created_at: new Date().toISOString(),
      client: {
        name: document.getElementById('clientName')?.value||'',
        contact: document.getElementById('clientContact')?.value||'',
        email: document.getElementById('clientEmail')?.value||'',
        address: document.getElementById('clientAddress')?.value||''
      },
      location: {
        city: document.getElementById('clientCity')?.value||'',
        region: document.getElementById('clientRegion')?.value||'',
        distance_km: distance_km
      },
      workspaces: workspaces,
      totals: {
        total_actual_area: workspaces.reduce(function(s,w){return s+(w.height*w.width);},0),
        total_chargeable_area: workspaces.reduce(function(s,w){return s+w.chargeable_area;},0),
        total_pictures: rows.length,
        project_duration: document.getElementById('projectDurationOutput')?.value||''
      },
     
    };
  }
  function validateForm(){
    var required = [
      { id: 'clientName', label: isEntrepreneur ? 'Business Name' : 'Client Name' },
      { id: 'clientContact', label: isEntrepreneur ? 'Business Phone' : 'Client Phone' },
      { id: 'clientEmail', label: isEntrepreneur ? 'Business Email' : 'Client Email' },
      { id: 'clientAddress', label: isEntrepreneur ? 'Business Address' : 'Client Address' },
      { id: 'clientCity', label: 'City' }
    ];
    for(var i=0;i<required.length;i++){
      var el=document.getElementById(required[i].id);
      if(!el || !el.value){ try{ el && el.focus(); }catch(e){}; alert('Please fill: ' + required[i].label); return false; }
    }
    if(document.querySelectorAll('.picture-row').length<1){ alert('Please add at least one workspace.'); return false; }
    return true;
  }
  function resetForm() {
    // 1. Clear text inputs
    const inputs = ['clientName', 'clientContact', 'clientEmail', 'clientAddress', 'clientCity', 'clientRegion', 'distanceInput', 'mandatoryPicturesOutput', 'projectDurationOutput'];
    inputs.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });

    // 2. Clear picture rows
    document.getElementById("leftPictureContainer").innerHTML = "";
    document.getElementById("rightPictureContainer").innerHTML = "";
    pictureCount = 0;
    
    // 3. Re-trigger handleCity to reset it properly (if a city was selected)
    handleCity();
  }
  async function onClick(){ 
    if(!validateForm()) return; 
    var p=buildPayload(); 
    
    try {
      const { data, error } = await window.supabaseClient
        .from('pps_queue')
        .insert([p]);

      if (error) throw error;

      alert('Request submitted successfully!'); 
      resetForm(); 
    } catch (err) {
      console.error('Error submitting request:', err);
      alert('Error submitting request. Please try again.');
    }
  }

  document.addEventListener('DOMContentLoaded', function(){ 
    var btn=document.getElementById('invoiceBtn'); 
    if(btn && !btn._ppsBound){ btn.addEventListener('click', onClick); btn._ppsBound=true; }
  });
})();
</script>

</body> 
</html>
